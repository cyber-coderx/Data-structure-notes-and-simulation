// ─── ALGORITHMS ──────────────────────────────────────────────────────────────
// Each returns an array of "frames" — snapshots of state at each step

function* bubbleSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - i - 1; j++) {
      comps++;
      yield { arr: [...a], comparing: [j, j + 1], sorted: range(n - i, n), swaps, comps, phase: "compare", msg: `Comparing a[${j}]=${a[j]} and a[${j+1}]=${a[j+1]}` };
      if (a[j] > a[j + 1]) {
        [a[j], a[j + 1]] = [a[j + 1], a[j]];
        swaps++;
        yield { arr: [...a], comparing: [j, j + 1], sorted: range(n - i, n), swaps, comps, phase: "swap", msg: `Swapping ${a[j+1]} ↔ ${a[j]} (larger bubbles right)` };
      }
    }
  }
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} swaps, ${comps} comparisons.` };
}

function* selectionSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  const sortedSet = [];
  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    for (let j = i + 1; j < n; j++) {
      comps++;
      yield { arr: [...a], comparing: [minIdx, j], sorted: [...sortedSet], swaps, comps, phase: "compare", msg: `Pass ${i+1}: min so far=${a[minIdx]}, checking a[${j}]=${a[j]}` };
      if (a[j] < a[minIdx]) minIdx = j;
    }
    if (minIdx !== i) {
      yield { arr: [...a], comparing: [i, minIdx], sorted: [...sortedSet], swaps, comps, phase: "swap", msg: `Swapping minimum ${a[minIdx]} to position ${i}` };
      [a[i], a[minIdx]] = [a[minIdx], a[i]];
      swaps++;
    }
    sortedSet.push(i);
    yield { arr: [...a], comparing: [], sorted: [...sortedSet], swaps, comps, phase: "sorted", msg: `Position ${i} locked: ${a[i]} is in final place.` };
  }
  sortedSet.push(n - 1);
  yield { arr: [...a], comparing: [], sorted: [...sortedSet], swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} swaps, ${comps} comparisons.` };
}

function* insertionSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  yield { arr: [...a], comparing: [0], sorted: [0], swaps, comps, phase: "sorted", msg: `a[0]=${a[0]} is trivially sorted.` };
  for (let i = 1; i < n; i++) {
    const key = a[i];
    let j = i - 1;
    yield { arr: [...a], comparing: [i], sorted: range(0, i), swaps, comps, phase: "compare", msg: `Inserting ${key} into sorted portion [0..${i-1}]` };
    while (j >= 0 && a[j] > key) {
      comps++;
      a[j + 1] = a[j];
      swaps++;
      yield { arr: [...a], comparing: [j, j + 1], sorted: range(0, j), swaps, comps, phase: "swap", msg: `Shifting ${a[j]} right to make room for ${key}` };
      j--;
    }
    a[j + 1] = key;
    yield { arr: [...a], comparing: [j + 1], sorted: range(0, i + 1), swaps, comps, phase: "sorted", msg: `Inserted ${key} at position ${j+1}. Sorted portion: [0..${i}]` };
  }
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} shifts, ${comps} comparisons.` };
}

function* mergeSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  const sortedSet = new Set();

  function* mergeSortHelper(lo, hi) {
    if (lo >= hi) { sortedSet.add(lo); return; }
    const mid = Math.floor((lo + hi) / 2);
    yield* mergeSortHelper(lo, mid);
    yield* mergeSortHelper(mid + 1, hi);
    // merge
    const left = a.slice(lo, mid + 1);
    const right = a.slice(mid + 1, hi + 1);
    let i = 0, j = 0, k = lo;
    while (i < left.length && j < right.length) {
      comps++;
      yield { arr: [...a], comparing: [lo + i, mid + 1 + j], sorted: [...sortedSet], swaps, comps, phase: "compare", msg: `Merging [${lo}..${mid}] + [${mid+1}..${hi}]: comparing ${left[i]} and ${right[j]}` };
      if (left[i] <= right[j]) { a[k++] = left[i++]; }
      else { a[k++] = right[j++]; swaps++; }
      yield { arr: [...a], comparing: [k - 1], sorted: [...sortedSet], swaps, comps, phase: "swap", msg: `Placed ${a[k-1]} at index ${k-1}` };
    }
    while (i < left.length) { a[k++] = left[i++]; }
    while (j < right.length) { a[k++] = right[j++]; }
    for (let x = lo; x <= hi; x++) sortedSet.add(x);
    yield { arr: [...a], comparing: [], sorted: [...sortedSet], swaps, comps, phase: "sorted", msg: `Merged range [${lo}..${hi}]` };
  }

  yield* mergeSortHelper(0, n - 1);
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${comps} comparisons. O(n log n) guaranteed.` };
}

function* quickSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  const sortedSet = new Set();

  function* partition(lo, hi) {
    const pivot = a[hi];
    yield { arr: [...a], comparing: [], pivot: hi, sorted: [...sortedSet], swaps, comps, phase: "pivot", msg: `Pivot = ${pivot} at index ${hi}` };
    let i = lo - 1;
    for (let j = lo; j < hi; j++) {
      comps++;
      yield { arr: [...a], comparing: [j], pivot: hi, sorted: [...sortedSet], swaps, comps, phase: "compare", msg: `Comparing a[${j}]=${a[j]} with pivot=${pivot}` };
      if (a[j] <= pivot) {
        i++;
        if (i !== j) { [a[i], a[j]] = [a[j], a[i]]; swaps++; }
        yield { arr: [...a], comparing: [i, j], pivot: hi, sorted: [...sortedSet], swaps, comps, phase: "swap", msg: `${a[j]} ≤ pivot: swap a[${i}]↔a[${j}]` };
      }
    }
    [a[i + 1], a[hi]] = [a[hi], a[i + 1]]; swaps++;
    sortedSet.add(i + 1);
    yield { arr: [...a], comparing: [], pivot: i + 1, sorted: [...sortedSet], swaps, comps, phase: "sorted", msg: `Pivot ${a[i+1]} is now in final position ${i+1}` };
    return i + 1;
  }

  function* qs(lo, hi) {
    if (lo >= hi) { if (lo === hi) sortedSet.add(lo); return; }
    const pi = yield* partition(lo, hi);
    yield* qs(lo, pi - 1);
    yield* qs(pi + 1, hi);
  }

  yield* qs(0, n - 1);
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} swaps, ${comps} comparisons.` };
}

function* heapSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;

  function* heapify(size, i) {
    let largest = i;
    const l = 2 * i + 1, r = 2 * i + 2;
    comps += 2;
    if (l < size && a[l] > a[largest]) largest = l;
    if (r < size && a[r] > a[largest]) largest = r;
    if (largest !== i) {
      yield { arr: [...a], comparing: [i, largest], sorted: range(n - (n - size), n), swaps, comps, phase: "swap", msg: `Heapify: swap a[${i}]=${a[i]} with a[${largest}]=${a[largest]}` };
      [a[i], a[largest]] = [a[largest], a[i]]; swaps++;
      yield* heapify(size, largest);
    }
  }

  yield { arr: [...a], comparing: [], sorted: [], swaps, comps, phase: "compare", msg: `Building max-heap from ${n} elements...` };
  for (let i = Math.floor(n / 2) - 1; i >= 0; i--) yield* heapify(n, i);
  yield { arr: [...a], comparing: [], sorted: [], swaps, comps, phase: "sorted", msg: `Max-heap built. Root=${a[0]} is the maximum.` };

  for (let i = n - 1; i > 0; i--) {
    yield { arr: [...a], comparing: [0, i], sorted: range(i + 1, n), swaps, comps, phase: "swap", msg: `Extract max ${a[0]}: swap with last element ${a[i]}` };
    [a[0], a[i]] = [a[i], a[0]]; swaps++;
    yield* heapify(i, 0);
  }
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} swaps. O(n log n) guaranteed.` };
}

function* shellSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  let gap = Math.floor(n / 2);
  while (gap > 0) {
    yield { arr: [...a], comparing: [], sorted: [], swaps, comps, phase: "compare", msg: `Gap = ${gap}: comparing elements ${gap} apart` };
    for (let i = gap; i < n; i++) {
      const temp = a[i]; let j = i;
      comps++;
      while (j >= gap && a[j - gap] > temp) {
        a[j] = a[j - gap]; swaps++;
        yield { arr: [...a], comparing: [j, j - gap], sorted: [], swaps, comps, phase: "swap", msg: `Gap=${gap}: shifting a[${j-gap}]=${a[j]} right` };
        j -= gap;
      }
      a[j] = temp;
    }
    gap = Math.floor(gap / 2);
  }
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted! ${swaps} shifts. Shell sort: O(n log²n) average.` };
}

function* radixSort(arr) {
  const a = [...arr];
  const n = a.length;
  let swaps = 0, comps = 0;
  const maxVal = Math.max(...a);
  let exp = 1;
  const bucketColors = {};

  while (Math.floor(maxVal / exp) > 0) {
    const digit = exp === 1 ? "ones" : exp === 10 ? "tens" : "hundreds";
    const output = new Array(n).fill(0);
    const count = new Array(10).fill(0);

    for (let i = 0; i < n; i++) {
      const d = Math.floor(a[i] / exp) % 10;
      count[d]++;
      comps++;
      yield { arr: [...a], comparing: [i], sorted: [], swaps, comps, phase: "compare", msg: `${digit} digit of ${a[i]} = ${d} → bucket [${d}]` };
    }
    for (let i = 1; i < 10; i++) count[i] += count[i - 1];
    for (let i = n - 1; i >= 0; i--) {
      const d = Math.floor(a[i] / exp) % 10;
      output[count[d] - 1] = a[i]; count[d]--;
    }
    for (let i = 0; i < n; i++) { a[i] = output[i]; swaps++; }
    yield { arr: [...a], comparing: [], sorted: [], swaps, comps, phase: "swap", msg: `Redistributed by ${digit} digit. Array reorganized.` };
    exp *= 10;
  }
  yield { arr: [...a], comparing: [], sorted: range(0, n), swaps, comps, phase: "sorted", msg: `✓ Sorted by Radix Sort! O(nk) — faster than O(n log n) for integers.` };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function range(a, b) { return Array.from({ length: b - a }, (_, i) => i + a); }

function generateArray(size, pattern) {
  const n = size;
  switch (pattern) {
    case "random": return Array.from({ length: n }, () => Math.floor(Math.random() * 95) + 5);
    case "nearly": {
      const a = range(1, n + 1).map(v => Math.round(v * 95 / n) + 5);
      for (let i = 0; i < Math.max(2, Math.floor(n * 0.1)); i++) {
        const x = Math.floor(Math.random() * n), y = Math.floor(Math.random() * n);
        [a[x], a[y]] = [a[y], a[x]];
      }
      return a;
    }
    case "reversed": return range(1, n + 1).map(v => Math.round((n + 1 - v) * 95 / n) + 5);
    case "few-unique": return Array.from({ length: n }, () => [10, 30, 50, 70, 90][Math.floor(Math.random() * 5)]);
    default: return Array.from({ length: n }, () => Math.floor(Math.random() * 95) + 5);
  }
}

const ALGORITHMS = {
  bubble:    { name: "Bubble Sort",    fn: bubbleSort,    color: "var(--bubble)",    best: "O(n)", avg: "O(n²)", worst: "O(n²)", space: "O(1)", stable: "Yes" },
  selection: { name: "Selection Sort", fn: selectionSort, color: "var(--selection)", best: "O(n²)", avg: "O(n²)", worst: "O(n²)", space: "O(1)", stable: "No" },
  insertion: { name: "Insertion Sort", fn: insertionSort, color: "var(--insertion)", best: "O(n)", avg: "O(n²)", worst: "O(n²)", space: "O(1)", stable: "Yes" },
  merge:     { name: "Merge Sort",     fn: mergeSort,     color: "var(--merge-c)",   best: "O(n log n)", avg: "O(n log n)", worst: "O(n log n)", space: "O(n)", stable: "Yes" },
  quick:     { name: "Quick Sort",     fn: quickSort,     color: "var(--quick)",     best: "O(n log n)", avg: "O(n log n)", worst: "O(n²)", space: "O(log n)", stable: "No" },
  heap:      { name: "Heap Sort",      fn: heapSort,      color: "var(--heap)",      best: "O(n log n)", avg: "O(n log n)", worst: "O(n log n)", space: "O(1)", stable: "No" },
  shell:     { name: "Shell Sort",     fn: shellSort,     color: "var(--shell)",     best: "O(n log n)", avg: "O(n log²n)", worst: "O(n²)", space: "O(1)", stable: "No" },
  radix:     { name: "Radix Sort",     fn: radixSort,     color: "var(--radix)",     best: "O(nk)", avg: "O(nk)", worst: "O(nk)", space: "O(n+k)", stable: "Yes" },
};

const SPEED_DELAYS = { 1: 500, 2: 200, 3: 80, 4: 30, 5: 8 };
const PATTERNS = ["random", "nearly", "reversed", "few-unique"];

function complexityClass(c) {
  if (c.includes("n²") || c.includes("nk")) return "c-yellow";
  if (c.includes("log n") || c === "O(n)") return "c-green";
  return "c-yellow";
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [algoKey, setAlgoKey] = useState("bubble");
  const [size, setSize] = useState(40);
  const [speed, setSpeed] = useState(3);
  const [pattern, setPattern] = useState("random");
  const [array, setArray] = useState(() => generateArray(40, "random"));
  const [frame, setFrame] = useState({ arr: generateArray(40, "random"), comparing: [], sorted: [], swaps: 0, comps: 0, phase: "idle", msg: "Press ▶ RUN to start the simulation." });
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [totalFrames, setTotalFrames] = useState(0);
  const [frameIdx, setFrameIdx] = useState(0);
  const framesRef = useRef([]);
  const stopRef = useRef(false);
  const timerRef = useRef(null);

  const algo = ALGORITHMS[algoKey];

  const reset = useCallback((newArr) => {
    stopRef.current = true;
    clearTimeout(timerRef.current);
    setRunning(false);
    const a = newArr || generateArray(size, pattern);
    setArray(a);
    setFrame({ arr: a, comparing: [], sorted: [], pivot: -1, swaps: 0, comps: 0, phase: "idle", msg: "Array ready. Press ▶ RUN to start." });
    setProgress(0);
    setFrameIdx(0);
    setTotalFrames(0);
  }, [size, pattern]);

  const regenerate = useCallback(() => {
    reset(generateArray(size, pattern));
  }, [size, pattern, reset]);

  useEffect(() => { reset(generateArray(size, pattern)); }, [algoKey]);

  const run = useCallback(() => {
    stopRef.current = false;
    // collect all frames first
    const frames = [];
    const gen = algo.fn([...array]);
    while (true) {
      const { value, done } = gen.next();
      if (done) break;
      frames.push(value);
      if (frames.length > 50000) break; // safety cap
    }
    framesRef.current = frames;
    setTotalFrames(frames.length);
    setRunning(true);
    setFrameIdx(0);

    let idx = 0;
    const step = () => {
      if (stopRef.current || idx >= frames.length) {
        setRunning(false);
        return;
      }
      setFrame(frames[idx]);
      setFrameIdx(idx);
      setProgress(Math.round((idx / Math.max(1, frames.length - 1)) * 100));
      idx++;
      timerRef.current = setTimeout(step, SPEED_DELAYS[speed]);
    };
    step();
  }, [array, algo, speed]);

  const stop = useCallback(() => {
    stopRef.current = true;
    clearTimeout(timerRef.current);
    setRunning(false);
  }, []);

  // Derived bar colors
  const getBarColor = (i) => {
    if (frame.sorted && frame.sorted.includes(i)) return "var(--sorted)";
    if (frame.pivot === i) return "var(--pivot)";
    if (frame.comparing && frame.comparing.includes(i)) {
      return frame.phase === "swap" ? "var(--swap)" : "var(--compare)";
    }
    return algo.color;
  };

  const maxVal = Math.max(...(frame.arr || array));
  const showVals = size <= 20;

  const speedDots = Array.from({ length: 5 }, (_, i) => i < speed);

  return (
    <>
      <style>{css}</style>
      <div className="app">
        {/* HEADER */}
        <div className="header">
          <div className="header-left">
            <h1>SORT<br />LAB</h1>
            <p>Sorting Algorithm Simulator · 8 Algorithms</p>
          </div>
          <div className="algo-pills">
            {Object.entries(ALGORITHMS).map(([key, a]) => (
              <div key={key}
                className={`pill ${algoKey === key ? "active" : ""}`}
                style={algoKey === key ? { background: a.color, borderColor: a.color } : {}}
                onClick={() => { if (!running) setAlgoKey(key); }}>
                {a.name}
              </div>
            ))}
          </div>
        </div>

        {/* MAIN */}
        <div className="main-grid">
          {/* SIDEBAR */}
          <div className="sidebar">
            <div className="sidebar-section">
              <div className="sidebar-label">Array Settings</div>
              <div className="slider-row">
                <span className="slider-name">Size</span>
                <input type="range" min={8} max={100} value={size}
                  onChange={e => { if (!running) { setSize(+e.target.value); reset(generateArray(+e.target.value, pattern)); } }} />
                <span className="slider-val">{size}</span>
              </div>
              <div className="slider-row">
                <span className="slider-name">Speed</span>
                <input type="range" min={1} max={5} value={speed}
                  onChange={e => setSpeed(+e.target.value)} />
                <span className="slider-val">{speed}×</span>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div className="sidebar-label" style={{ marginBottom: 8 }}>Pattern</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {PATTERNS.map(p => (
                    <div key={p}
                      className={`pill ${pattern === p ? "active" : ""}`}
                      style={pattern === p ? { background: "var(--text)", borderColor: "var(--text)", fontSize: 10 } : { fontSize: 10 }}
                      onClick={() => { if (!running) { setPattern(p); reset(generateArray(size, p)); } }}>
                      {p}
                    </div>
                  ))}
                </div>
              </div>
              <div className="speed-dots">
                {speedDots.map((a, i) => <div key={i} className={`speed-dot ${a ? "active" : ""}`} />)}
                <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 10, color: "var(--muted2)", marginLeft: 6 }}>
                  {["", "Very Slow", "Slow", "Medium", "Fast", "Blazing"][speed]}
                </span>
              </div>
            </div>

            <div className="sidebar-section">
              <div className="sidebar-label">Controls</div>
              <div className="btn-row">
                <button className={`btn btn-go ${running ? "running" : ""}`}
                  onClick={running ? stop : run}>
                  {running ? "■ STOP" : "▶ RUN"}
                </button>
                <button className="btn" onClick={regenerate} disabled={running}>↺ New</button>
              </div>
            </div>

            <div className="sidebar-section">
              <div className="sidebar-label">Live Stats</div>
              <div className="stats-grid">
                <div className="stat-box">
                  <div className="s-label">Comparisons</div>
                  <div className="s-val">{(frame.comps || 0).toLocaleString()}</div>
                </div>
                <div className="stat-box">
                  <div className="s-label">Swaps</div>
                  <div className="s-val">{(frame.swaps || 0).toLocaleString()}</div>
                </div>
                <div className="stat-box">
                  <div className="s-label">Progress</div>
                  <div className="s-val">{progress}%</div>
                </div>
                <div className="stat-box">
                  <div className="s-label">Steps</div>
                  <div className="s-val">{frameIdx.toLocaleString()}</div>
                </div>
              </div>
            </div>

            <div className="sidebar-section">
              <div className="sidebar-label">Complexity</div>
              <div className="complexity-box">
                <div className="c-title">{algo.name}</div>
                {[
                  ["Best Case", algo.best],
                  ["Average", algo.avg],
                  ["Worst Case", algo.worst],
                  ["Space", algo.space],
                  ["Stable", algo.stable],
                ].map(([k, v]) => (
                  <div className="c-row" key={k}>
                    <span className="c-key">{k}</span>
                    <span className={`c-badge ${
                      v === "Yes" ? "c-green" : v === "No" ? "c-red" :
                      v.includes("n²") ? "c-red" :
                      v.includes("n log") || v === "O(n)" || v === "O(1)" ? "c-green" :
                      "c-yellow"
                    }`}>{v}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="sidebar-section">
              <div className="sidebar-label">Color Legend</div>
              <div className="legend">
                {[
                  ["var(--compare)", "Comparing"],
                  ["var(--swap)", "Swapping"],
                  ["var(--sorted)", "Sorted / Final"],
                  ["var(--pivot)", "Pivot (Quick Sort)"],
                ].map(([c, l]) => (
                  <div className="legend-item" key={l}>
                    <div className="legend-dot" style={{ background: c }} />
                    <span className="legend-label">{l}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* VIZ */}
          <div className="viz-area">
            <div className="algo-title-row">
              <div className="algo-big-name" style={{ color: algo.color }}>{algo.name.toUpperCase()}</div>
              <div className="algo-phase" style={{
                color: frame.phase === "swap" ? "var(--swap)" :
                       frame.phase === "sorted" ? "var(--sorted)" :
                       frame.phase === "pivot" ? "var(--pivot)" : "var(--compare)"
              }}>
                {frame.phase === "idle" ? "READY" : frame.phase === "sorted" && progress === 100 ? "COMPLETE" : frame.phase?.toUpperCase()}
              </div>
            </div>

            {/* BAR CHART */}
            <div className="bar-stage">
              <div className="bars-wrap">
                {(frame.arr || array).map((val, i) => {
                  const heightPct = (val / maxVal) * 96;
                  const color = getBarColor(i);
                  return (
                    <div key={i} className="bar"
                      style={{ height: `${heightPct}%`, background: color, opacity: 0.88 }}>
                      {showVals && (
                        <div className="bar-val" style={{ color }}>{val}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* STEP LOG */}
            <div className={`step-log ${frame.phase}`}
              style={frame.phase === "swap" ? { "--compare": "var(--swap)" } : {}}>
              {frame.msg || "Press ▶ RUN to start."}
            </div>

            {/* PROGRESS */}
            <div className="prog-wrap">
              <div className="prog-fill" style={{
                width: `${progress}%`,
                background: `linear-gradient(90deg, ${algo.color}, var(--sorted))`
              }} />
            </div>

            {/* ARRAY STRIP (small arrays only) */}
            {size <= 30 && (
              <div className="array-strip" style={{ marginTop: 12 }}>
                {(frame.arr || array).map((val, i) => {
                  const isSorted = frame.sorted && frame.sorted.includes(i);
                  const isCmp = frame.comparing && frame.comparing.includes(i);
                  const isSwap = isCmp && frame.phase === "swap";
                  const isPivot = frame.pivot === i;
                  return (
                    <div key={i} className={`arr-cell ${isPivot ? "pvt" : isSorted ? "srt" : isSwap ? "swp" : isCmp ? "cmp" : ""}`}>
                      {val}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ALGORITHM DESCRIPTION */}
            <div style={{
              marginTop: 16,
              background: "var(--panel)", border: "1px solid var(--border)",
              borderRadius: 10, padding: "16px 20px",
              display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 24px"
            }}>
              {[
                { bubble: "Repeatedly compare adjacent elements and swap if out of order. Largest values 'bubble' to the end each pass.", selection: "Find the minimum in the unsorted portion, swap it to the front. Simple but always O(n²) comparisons.", insertion: "Build a sorted portion one element at a time, inserting each new element into its correct position.", merge: "Divide array in half recursively, sort each half, then merge sorted halves together. Guaranteed O(n log n).", quick: "Choose a pivot, partition elements around it, recursively sort each partition. Fastest in practice.", heap: "Build a max-heap, then repeatedly extract the maximum to the sorted end. O(n log n) worst case.", shell: "Generalization of insertion sort using gap sequences. Faster by sorting elements far apart first.", radix: "Sort by individual digits from least to most significant. Faster than comparison sorts for integers." }[algoKey],
              ].map((desc, i) => (
                <div key={i} style={{ gridColumn: "1 / -1", fontFamily: "'IBM Plex Mono',monospace", fontSize: 12, color: "var(--muted2)", lineHeight: 1.7 }}>
                  {desc}
                </div>
              ))}
              <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }}>
                <span style={{ color: "var(--muted)" }}>Best: </span>
                <span style={{ color: "var(--sorted)" }}>{algo.best}</span>
              </div>
              <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }}>
                <span style={{ color: "var(--muted)" }}>Worst: </span>
                <span style={{ color: algo.worst.includes("n²") ? "var(--swap)" : "var(--sorted)" }}>{algo.worst}</span>
              </div>
              <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }}>
                <span style={{ color: "var(--muted)" }}>In-place: </span>
                <span style={{ color: algo.space === "O(1)" || algo.space === "O(log n)" ? "var(--sorted)" : "var(--compare)" }}>
                  {algo.space === "O(1)" || algo.space === "O(log n)" ? "Yes (" + algo.space + ")" : "No (" + algo.space + ")"}
                </span>
              </div>
              <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }}>
                <span style={{ color: "var(--muted)" }}>Stable: </span>
                <span style={{ color: algo.stable === "Yes" ? "var(--sorted)" : "var(--compare)" }}>{algo.stable}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
