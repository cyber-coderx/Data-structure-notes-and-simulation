<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Complete Coding Book v1.01 — Fundamentals · OOP · Data Structures</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{background:#09090e}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;


// ============================================================
// GLOBAL STYLES
// ============================================================
const globalStyles = `
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Outfit:wght@300;400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090e;
    --surface: #111118;
    --surface2: #18181f;
    --surface3: #1e1e28;
    --border: #252535;
    --border2: #2e2e42;
    --accent: #e8a87c;
    --accent2: #7cbbe8;
    --accent3: #a87ce8;
    --accent4: #7ce8b4;
    --accent5: #e87ca8;
    --text: #ededf5;
    --muted: #5c5c78;
    --muted2: #8888a8;
    --node-bg: #16161e;
  }

  html, body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .book-wrap { display: flex; min-height: 100vh; max-width: 1440px; margin: 0 auto; }

  /* SIDEBAR */
  .sidebar {
    width: 272px; min-width: 272px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto; padding: 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    display: flex; flex-direction: column;
  }

  .sidebar-header {
    padding: 28px 22px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(160deg, rgba(232,168,124,0.08) 0%, transparent 100%);
  }

  .sidebar-version {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 6px;
  }

  .sidebar-title {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 900;
    color: var(--text); line-height: 1.2;
  }

  .sidebar-subtitle {
    font-family: 'DM Mono', monospace;

  .sidebar-progress {

  }

  .nav-item {

  }

    transform: translateY(-50%);

    letter-spacing: -4px;

  /* BODY */
  .chapter-body { padding: 48px 64px; }

  .section { margin-bottom: 64px; }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 24px; font-weight: 700;
    color: var(--text); margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::before {
    content: ''; display: block;
    width: 3px; height: 24px;
    background: var(--accent); border-radius: 2px; flex-shrink: 0;
  }

  .prose {
    font-size: 15px; line-height: 1.85;
    color: #b8b8d0; margin-bottom: 18px;
    font-weight: 300;
  }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose em { color: var(--accent); font-style: normal; font-weight: 600; }

  /* VIZ BOX */
  .viz-box {
    background: var(--surface2);
    border: 1px solid var(--border2);

  .viz-label {

  .ctrl-row {

  .btn {

    padding: 7px 15px; border-radius: 7px; cursor: pointer;

  .step-msg {

  .dot {
    width: 7px; height: 7px; border-radius: 50%;

  .dot.active { background: var(--accent); transform: scale(1.4); }
  .dot.done { background: var(--accent4); }

  /* CODE */
  .code-block {
    background: #080810; border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    line-height: 1.9; overflow-x: auto; margin: 14px 0;
    tab-size: 2;
  }
  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .num { color: #f78c6c; }
  .cm { color: #3d5060; font-style: italic; }
  .cls { color: var(--accent); }
  .op { color: var(--accent2); }
  .prop { color: var(--accent4); }

  /* TABLE */
  .tbl {

  }
  .tbl th {
    padding: 9px 14px; text-align: left;
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--accent); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  }
  .tbl td {
    padding: 9px 14px; border: 1px solid var(--border);
    color: var(--text); font-size: 12px;
  }
  .tbl tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

  /* BADGE */
  .badge {
    display: inline-block; font-family: 'DM Mono', monospace;
    font-size: 10px; padding: 2px 8px; border-radius: 4px; margin: 0 3px;
  }
  .bg { background: rgba(124,232,180,0.12); color: var(--accent4); border: 1px solid rgba(124,232,180,0.25); }
  .by { background: rgba(232,168,124,0.12); color: var(--accent); border: 1px solid rgba(232,168,124,0.25); }
  .br { background: rgba(232,124,168,0.12); color: var(--accent5); border: 1px solid rgba(232,124,168,0.25); }

  /* INFO CARD */
  .info-card {
    background: rgba(168,124,232,0.07);
    border: 1px solid rgba(168,124,232,0.22);
    border-radius: 10px; padding: 16px 20px;
    margin: 14px 0; font-size: 14px;
    line-height: 1.75; color: #b8b8d0;
  }
  .info-card strong { color: var(--accent3); }

  .tip-card {
    background: rgba(124,232,180,0.06);
    border: 1px solid rgba(124,232,180,0.2);
    border-left: 3px solid var(--accent4);
    border-radius: 8px; padding: 14px 18px;
    margin: 14px 0; font-size: 13px; line-height: 1.75; color: #b8b8d0;
  }
  .tip-card strong { color: var(--accent4); }

  /* GRID CARDS */
  .card-grid { display: grid; gap: 12px; margin: 16px 0; }
  .card-grid-2 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .card-grid-3 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

  .feature-card {
    background: var(--surface3); border: 1px solid var(--border2);
    border-radius: 10px; padding: 18px;
  }
  .feature-card .fc-icon { font-size: 22px; margin-bottom: 10px; }
  .feature-card .fc-title { font-weight: 700; color: var(--text); font-size: 14px; margin-bottom: 6px; }
  .feature-card .fc-desc { font-size: 13px; color: var(--muted2); line-height: 1.65; }

  /* BOTTOM NAV */
  .bottom-nav {
    padding: 24px 64px 40px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .chapter-hero { padding: 36px 24px 28px; }
    .hero-big-num { display: none; }
    .chapter-hero h2 { font-size: 32px; }
    .chapter-body { padding: 28px 24px; }
    .bottom-nav { padding: 20px 24px 32px; }
  }
`;

// ============================================================
// SHARED UTILS
// ============================================================
const sleep = ms => new Promise(r => setTimeout(r, ms));

function StepViz({ steps, children }) {
  const [step, setStep] = useState(0);
  return (
    <div>
      {children(steps[step], step)}
      <div className="step-msg">{steps[step].msg}</div>
      <div className="ctrl-row">
        <button className="btn" onClick={() => setStep(s => Math.max(0, s - 1))} disabled={step === 0}>← Prev</button>
        <button className="btn btn-primary" onClick={() => setStep(s => Math.min(steps.length - 1, s + 1))} disabled={step === steps.length - 1}>Next →</button>
        <button className="btn" onClick={() => setStep(0)}>↺ Reset</button>
        <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: "var(--muted)", marginLeft: 8 }}>
          {step + 1} / {steps.length}
        </span>
      </div>
      <div className="step-dots">
        {steps.map((_, i) => (
          <div key={i} className={`dot ${i === step ? "active" : i < step ? "done" : ""}`}
            onClick={() => setStep(i)} />
        ))}
      </div>
    </div>
  );
}

// --- Variables & Types Viz ---
function VariablesViz() {
  const steps = [
    {
      vars: [],
      msg: "Memory starts empty. A variable is a named box in memory that holds a value."
    },
    {
      vars: [{ name: "age", type: "int", value: "25", addr: "0x1A04", color: "#e8a87c" }],
      msg: "int age = 25; — Declares an integer. Box labeled 'age', 4 bytes, holds the number 25."
    },
    {
      vars: [
        { name: "age", type: "int", value: "25", addr: "0x1A04", color: "#e8a87c" },
        { name: "price", type: "float", value: "9.99", addr: "0x1A08", color: "#7cbbe8" }
      ],
      msg: "float price = 9.99; — A floating-point number. 4 bytes, stores decimals with IEEE-754 encoding."
    },
    {
      vars: [
        { name: "age", type: "int", value: "25", addr: "0x1A04", color: "#e8a87c" },
        { name: "price", type: "float", value: "9.99", addr: "0x1A08", color: "#7cbbe8" },
        { name: "name", type: "string", value: '"Alice"', addr: "0x1A0C", color: "#a87ce8" }
      ],
      msg: 'string name = "Alice"; — A string is a sequence of characters. Stored as pointer to char array on the heap.'
    },
    {
      vars: [
        { name: "age", type: "int", value: "25", addr: "0x1A04", color: "#e8a87c" },
        { name: "price", type: "float", value: "9.99", addr: "0x1A08", color: "#7cbbe8" },
        { name: "name", type: "string", value: '"Alice"', addr: "0x1A0C", color: "#a87ce8" },
        { name: "isActive", type: "bool", value: "true", addr: "0x1A10", color: "#7ce8b4" }
      ],
      msg: "bool isActive = true; — Boolean: 1 bit of meaning, typically 1 byte stored. Only true or false."
    },
    {
      vars: [
        { name: "age", type: "int", value: "26", addr: "0x1A04", color: "#e8a87c", changed: true },
        { name: "price", type: "float", value: "9.99", addr: "0x1A08", color: "#7cbbe8" },
        { name: "name", type: "string", value: '"Alice"', addr: "0x1A0C", color: "#a87ce8" },
        { name: "isActive", type: "bool", value: "true", addr: "0x1A10", color: "#7ce8b4" }
      ],
      msg: "age = 26; — Reassignment! The old value (25) is overwritten in the SAME memory address 0x1A04."
    },
  ];

  return (
    <StepViz steps={steps}>
      {(cur) => (
        <div style={{ minHeight: 180 }}>
          <svg width="100%" viewBox="0 0 620 160" style={{ display: "block" }}>
            {/* Stack frame */}
            <rect x={10} y={10} width={600} height={140} rx={8}
              fill="rgba(0,0,0,0.25)" stroke="var(--border2)" strokeWidth={1} strokeDasharray="4,3" />
            <text x={22} y={26} fontSize={9} fill="var(--muted)" fontFamily="DM Mono,monospace" letterSpacing={1}>STACK FRAME — main()</text>

            {cur.vars.map((v, i) => (
              <g key={v.name} style={{ transition: "all 0.4s" }}>
                {/* Address */}
                <text x={30 + i * 142} y={45} fontSize={9} fill="var(--muted)" fontFamily="DM Mono,monospace">{v.addr}</text>
                {/* Box */}
                <rect x={20 + i * 142} y={50} width={120} height={72} rx={8}
                  fill={v.changed ? `${v.color}28` : `${v.color}12`}
                  stroke={v.color} strokeWidth={v.changed ? 2.5 : 1.5} />
                {/* Type label */}
                <text x={80 + i * 142} y={68} textAnchor="middle" fontSize={9}
                  fill={v.color} fontFamily="DM Mono,monospace" opacity={0.7}>{v.type}</text>
                {/* Value */}
                <text x={80 + i * 142} y={92} textAnchor="middle" fontSize={16}
                  fontWeight="700" fill={v.changed ? v.color : "var(--text)"}
                  fontFamily="DM Mono,monospace">{v.value}</text>
                {/* Name */}
                <text x={80 + i * 142} y={112} textAnchor="middle" fontSize={11}
                  fill={v.color} fontFamily="Outfit,sans-serif" fontWeight={600}>{v.name}</text>
                {/* Changed badge */}
                {v.changed && (
                  <text x={80 + i * 142} y={132} textAnchor="middle" fontSize={9}
                    fill={v.color} fontFamily="DM Mono,monospace">← updated!</text>
                )}
              </g>
            ))}

            {cur.vars.length === 0 && (
              <text x={310} y={90} textAnchor="middle" fontSize={13} fill="var(--muted)"
                fontFamily="DM Mono,monospace">[ empty — no variables declared yet ]</text>
            )}
          </svg>
        </div>
      )}
    </StepViz>
  );
}

// --- Operators Viz ---
function OperatorsViz() {
  const steps = [
    { a: 10, b: 3, op: null, result: null, highlight: "", msg: "We have two variables: a = 10, b = 3. Let's apply operators step by step." },
    { a: 10, b: 3, op: "+", result: 13, highlight: "arith", msg: "a + b = 13. Addition: combines two values into their sum." },
    { a: 10, b: 3, op: "-", result: 7, highlight: "arith", msg: "a - b = 7. Subtraction: difference between values." },
    { a: 10, b: 3, op: "*", result: 30, highlight: "arith", msg: "a * b = 30. Multiplication: repeated addition." },
    { a: 10, b: 3, op: "/", result: "3.33", highlight: "arith", msg: "a / b = 3.33. Division: how many times b fits into a." },
    { a: 10, b: 3, op: "%", result: 1, highlight: "arith", msg: "a % b = 1. Modulo: the REMAINDER after division. 10 = 3×3 + 1." },
    { a: 10, b: 3, op: ">", result: "true", highlight: "compare", msg: "a > b → true. Comparison operators return boolean values." },
    { a: 10, b: 3, op: "==", result: "false", highlight: "compare", msg: "a == b → false. Equality check: are both values identical?" },
    { a: 10, b: 3, op: "&&", result: "true && false = false", highlight: "logical", msg: "true && false → false. Logical AND: BOTH sides must be true." },
    { a: 10, b: 3, op: "||", result: "true || false = true", highlight: "logical", msg: "true || false → true. Logical OR: at least ONE side must be true." },
  ];

  const opColor = { arith: "#e8a87c", compare: "#7cbbe8", logical: "#a87ce8" };

  return (
    <StepViz steps={steps}>
      {(cur) => (
        <svg width="100%" viewBox="0 0 580 130" style={{ display: "block" }}>
          {/* a box */}
          <rect x={20} y={30} width={90} height={70} rx={10}
            fill="rgba(232,168,124,0.12)" stroke="#e8a87c" strokeWidth={1.5} />
          <text x={65} y={52} textAnchor="middle" fontSize={9} fill="#e8a87c" fontFamily="DM Mono,monospace">int</text>
          <text x={65} y={77} textAnchor="middle" fontSize={26} fontWeight={700}
            fill="var(--text)" fontFamily="DM Mono,monospace">{cur.a}</text>
          <text x={65} y={96} textAnchor="middle" fontSize={12} fill="#e8a87c" fontFamily="Outfit,sans-serif" fontWeight={600}>a</text>

          {/* Operator */}
          <rect x={145} y={42} width={70} height={46} rx={8}
            fill={cur.op ? `${opColor[cur.highlight] || "#555"}22` : "var(--surface3)"}
            stroke={cur.op ? opColor[cur.highlight] || "#555" : "var(--border2)"} strokeWidth={cur.op ? 2 : 1} />
          <text x={180} y={73} textAnchor="middle" fontSize={22} fontWeight={700}
            fill={cur.op ? opColor[cur.highlight] : "var(--muted)"}
            fontFamily="DM Mono,monospace">{cur.op || "?"}</text>

          {/* b box */}
          <rect x={248} y={30} width={90} height={70} rx={10}
            fill="rgba(124,187,232,0.12)" stroke="#7cbbe8" strokeWidth={1.5} />
          <text x={293} y={52} textAnchor="middle" fontSize={9} fill="#7cbbe8" fontFamily="DM Mono,monospace">int</text>
          <text x={293} y={77} textAnchor="middle" fontSize={26} fontWeight={700}
            fill="var(--text)" fontFamily="DM Mono,monospace">{cur.b}</text>
          <text x={293} y={96} textAnchor="middle" fontSize={12} fill="#7cbbe8" fontFamily="Outfit,sans-serif" fontWeight={600}>b</text>

          {/* = */}
          {cur.result !== null && (
            <>
              <text x={365} y={73} textAnchor="middle" fontSize={22} fontWeight={700}

    { i: 0, output: ["i=0: ★"], state: "body", msg: "Execute body: print(i). Output so far: i=0. Then INCREMENT: i++." },
    { i: 1, output: ["i=0: ★"], state: "check", msg: "CHECK: i < 5 → 1 < 5 → TRUE. Enter body again." },
    { i: 1, output: ["i=0: ★", "i=1: ★★"], state: "body", msg: "Execute body again. i=1. Output grows. INCREMENT: i=2." },

// --- Functions Viz ---
function FunctionsViz() {
  const steps = [
    { phase: "define", callStack: [], result: null, msg: "Define function: int add(int a, int b). This just stores the blueprint — doesn't run yet." },
    { phase: "call", callStack: ["main()"], result: null, msg: "main() runs. Calls add(5, 3). A NEW stack frame is pushed for add()." },
    { phase: "frame", callStack: ["main()", "add(a=5, b=3)"], result: null, msg: "add() frame created with local copies: a=5, b=3. These are SEPARATE from main's variables." },
    { phase: "execute", callStack: ["main()", "add(a=5, b=3)"], result: 8, msg: "Execute: return a + b = 5 + 3 = 8. Return value computed." },
    { phase: "return", callStack: ["main()"], result: 8, msg: "add() frame POPPED from stack. Value 8 returned to main(). add's local vars destroyed." },
    { phase: "done", callStack: ["main()"], result: 8, stored: "sum = 8", msg: "main() stores result: int sum = add(5,3) = 8. Function call complete!" },
  ];

  const frameColors = ["#7ce8b4", "#e8a87c"];

  return (
    <StepViz steps={steps}>
      {(cur) => (
        <div style={{ display: "flex", gap: 32, flexWrap: "wrap", minHeight: 200 }}>

// --- Encapsulation Viz ---
function EncapsulationViz() {
  const steps = [
    { access: "none", balance: 1000, hackedTo: null, msg: "No encapsulation: balance is a public field. Anyone can read or write it directly." },
    { access: "bad", balance: -9999, hackedTo: -9999, msg: 'Without protection: bankAccount.balance = -9999; — Direct field access! No validation. Balance corrupted!' },
    { access: "protected", balance: 1000, msg: "With encapsulation: balance is PRIVATE. The field is hidden inside the class. Cannot be accessed directly from outside." },
    { access: "getter", balance: 1000, showing: "getter", msg: "Public GETTER: getBalance() → returns 1000. Read-only access through a controlled method." },
    { access: "setter-fail", balance: 1000, showing: "setter", attempt: -500, msg: "Public SETTER: deposit(-500) → Validation runs! Negative amount rejected. Balance stays 1000." },
    { access: "setter-ok", balance: 1350, showing: "setter", attempt: 350, msg: "deposit(350) → Validation passes! 350 > 0. balance = 1000 + 350 = 1350. Safe update." },
  ];

  return (
    <StepViz steps={steps}>
      {(cur) => (
        <svg width="100%" viewBox="0 0 580 210" style={{ display: "block" }}>
          {/* Class box */}
          <rect x={180} y={20} width={220} height={180} rx={12}
            fill="var(--surface3)" stroke="var(--border2)" strokeWidth={1.5} />
          <text x={290} y={40} textAnchor="middle" fontSize={11} fill="var(--accent)"
            fontFamily="DM Mono,monospace" letterSpacing={1}>class BankAccount</text>
          <line x1={190} y1={46} x2={390} y2={46} stroke="var(--border2)" strokeWidth={1} />

          {/* Private field */}
          <rect x={196} y={54} width={198} height={36} rx={7}
            fill={cur.access === "bad" ? "rgba(232,124,168,0.2)" : cur.access === "none" ? "rgba(232,168,124,0.12)" : "rgba(168,124,232,0.12)"}
            stroke={cur.access === "bad" ? "#e87ca8" : cur.access === "none" ? "var(--accent)" : "#a87ce8"}
            strokeWidth={cur.access === "bad" || cur.access === "protected" ? 2.5 : 1.5} />
          <text x={295} y={68} textAnchor="middle" fontSize={10} fill="var(--muted)" fontFamily="DM Mono,monospace">
            {cur.access === "none" || cur.access === "bad" ? "PUBLIC" : "🔒 PRIVATE"}
          </text>
          <text x={295} y={83} textAnchor="middle" fontSize={14} fontWeight={700}
            fill={cur.access === "bad" ? "#e87ca8" : cur.access === "none" ? "var(--accent)" : "#a87ce8"}
            fontFamily="DM Mono,monospace">balance = {cur.access === "bad" ? cur.hackedTo : cur.balance}</text>

          {/* Methods */}
          <rect x={196} y={100} width={93} height={28} rx={6}
            fill={cur.showing === "getter" ? "rgba(124,232,180,0.2)" : "rgba(255,255,255,0.03)"}
            stroke={cur.showing === "getter" ? "var(--accent4)" : "var(--border2)"}
            strokeWidth={cur.showing === "getter" ? 2 : 1} />
          <text x={242} y={118} textAnchor="middle" fontSize={11} fill={cur.showing === "getter" ? "var(--accent4)" : "var(--muted2)"}
            fontFamily="DM Mono,monospace">getBalance()</text>

          <rect x={300} y={100} width={90} height={28} rx={6}
            fill={cur.showing === "setter" ? "rgba(124,187,232,0.2)" : "rgba(255,255,255,0.03)"}
            stroke={cur.showing === "setter" ? "#7cbbe8" : "var(--border2)"}
            strokeWidth={cur.showing === "setter" ? 2 : 1} />
          <text x={345} y={118} textAnchor="middle" fontSize={11} fill={cur.showing === "setter" ? "#7cbbe8" : "var(--muted2)"}
            fontFamily="DM Mono,monospace">deposit(n)</text>

          {/* Validation box */}
          {cur.showing === "setter" && (
            <g>
              <rect x={196} y={136} width={198} height={40} rx={6}
                fill={cur.access === "setter-fail" ? "rgba(232,124,168,0.15)" : "rgba(124,232,180,0.12)"}
                stroke={cur.access === "setter-fail" ? "#e87ca8" : "var(--accent4)"}
                strokeWidth={1.5} />
              <text x={295} y={150} textAnchor="middle" fontSize={10} fill="var(--muted)"
                fontFamily="DM Mono,monospace">if (n {">"} 0) balance += n</text>
              <text x={295} y={165} textAnchor="middle" fontSize={11} fontWeight={700}
                fill={cur.access === "setter-fail" ? "#e87ca8" : "var(--accent4)"}
                fontFamily="DM Mono,monospace">
                {cur.access === "setter-fail" ? `❌ ${cur.attempt} rejected` : `✓ +${cur.attempt} accepted`}
              </text>
            </g>
          )}

          {/* Outside world */}
          <rect x={10} y={80} width={130} height={50} rx={8}
            fill="rgba(232,124,168,0.06)" stroke={cur.access === "bad" ? "#e87ca8" : "var(--border)"} strokeWidth={cur.access === "bad" ? 2 : 1} />
          <text x={75} y={100} textAnchor="middle" fontSize={11} fill="var(--muted2)" fontFamily="DM Mono,monospace">outside</text>
          <text x={75} y={118} textAnchor="middle" fontSize={11}

            fontFamily="DM Mono,monospace">
            {cur.access === "bad" ? "balance=-9999 ❌" : "code"}

          {/* Arrow from outside */}
          {cur.access === "bad" && (
            <g>
              <line x1={140} y1={105} x2={194} y2={70} stroke="#e87ca8" strokeWidth={2} strokeDasharray="4,2" />

          )}
          {(cur.showing === "getter" || cur.showing === "setter") && (
            <g>
              <line x1={140} y1={105} x2={194} y2={114} stroke="var(--accent4)" strokeWidth={1.5} />
              <text x={145} y={100} fontSize={9} fill="var(--accent4)" fontFamily="DM Mono,monospace">method call</text>
            </g>
          )}

          {/* Lock icon for protected */}
          {(cur.access === "protected" || cur.access === "getter" || cur.access === "setter" || cur.access === "setter-fail" || cur.access === "setter-ok") && (
            <text x={415} y={75} fontSize={28}>🔒</text>
          )}
        </svg>
      )}
    </StepViz>
  );
}

// --- Abstraction Viz ---
function AbstractionViz() {
  const steps = [
    { level: "user", msg: "Abstraction hides complexity. User calls car.drive(). They don't need to know HOW it works." },
    { level: "interface", msg: "The public INTERFACE: start(), accelerate(), brake(), stop(). Simple, clean contract." },
    { level: "mid", msg: "Under the hood: Engine, Transmission, Brakes — each a complex object doing real work." },
    { level: "deep", msg: "Deeper: Fuel injection, gear ratios, hydraulic pressure... All hidden from the driver." },
    { level: "call", msg: "car.accelerate() → triggers Engine.injectFuel() + Transmission.upshift() automatically. You just pressed a pedal." },
  ];

  const layers = [
    { label: "👤 User / Caller", detail: "car.drive(60)", color: "#7ce8b4", y: 20 },
    { label: "📋 Public Interface", detail: "start() accelerate() brake() stop()", color: "#e8a87c", y: 80 },
    { label: "⚙ Engine Layer", detail: "Fuel Injection · Pistons · Crankshaft", color: "#7cbbe8", y: 140 },
    { label: "🔩 Hardware Layer", detail: "Valves · Spark plugs · Hydraulics", color: "#a87ce8", y: 200 },
  ];

  const levelActive = { user: 0, interface: 1, mid: 2, deep: 3, call: [0, 1, 2] };
  const active = levelActive[steps.find((_, i) => steps[i]) ? steps[0].level : "user"];

  return (
    <StepViz steps={steps}>
      {(cur) => {
        const curActive = levelActive[cur.level];
        return (
          <svg width="100%" viewBox="0 0 560 260" style={{ display: "block" }}>
            {layers.map((layer, i) => {
              const isActive = Array.isArray(curActive)
                ? curActive.includes(i)
                : curActive >= i;
              return (
                <g key={i}>
                  <rect x={20} y={layer.y} width={520} height={52} rx={8}
                    fill={isActive ? `${layer.color}12` : "rgba(255,255,255,0.02)"}
                    stroke={isActive ? layer.color : "var(--border)"}

                  <text x={36} y={layer.y + 38} fontSize={11}
                    fill={isActive ? "var(--text)" : "var(--muted)"}
                    fontFamily="DM Mono,monospace">{layer.detail}</text>
                  {i < layers.length - 1 && (
                    <g>
                      <line x1={280} y1={layer.y + 52} x2={280} y2={layer.y + 62} stroke="var(--border2)" strokeWidth={1.5} />
                      <text x={290} y={layer.y + 60} fontSize={9} fill="var(--muted)" fontFamily="DM Mono,monospace">hidden ↓</text>
                    </g>
                  )}
                </g>
              );
            })}
            {/* Call flow arrow */}
            {cur.level === "call" && (
              <g>
                <path d="M 544,46 L 544,192" stroke="var(--accent4)" strokeWidth={2}
                  strokeDasharray="6,3" markerEnd="url(#abs-arr)" />
                <defs>
                  <marker id="abs-arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L8,3 z" fill="var(--accent4)" />
                  </marker>
                </defs>
                <text x={546} y={126} fontSize={10} fill="var(--accent4)" fontFamily="DM Mono,monospace"
                  transform="rotate(90,546,126)">call cascades →</text>
              </g>
            )}
          </svg>
        );
      }}
    </StepViz>
  );
}

                <g key={i}>

          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 10, color: "var(--muted)", letterSpacing: 2, marginBottom: 10 }}>OP LOG</div>

              if (!s.op || i > steps.indexOf(steps.find(x => x === cur))) return null;
              const col = s.op === "pop" ? "var(--accent5)" : s.op === "peek" ? "var(--accent)" : "var(--accent4)";
              return (
                <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4, alignItems: "center" }}>

                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </StepViz>
  );
}

function BSTViz() {
  const allNodes = {
    50: { val: 50, x: 250, y: 40 }, 30: { val: 30, x: 140, y: 120 }, 70: { val: 70, x: 360, y: 120 },
    20: { val: 20, x: 80, y: 200 }, 40: { val: 40, x: 200, y: 200 }, 60: { val: 60, x: 300, y: 200 }, 80: { val: 80, x: 420, y: 200 }
  };
  const steps = [
    { visible: [50], highlight: [], path: [], msg: "Insert 50 — becomes root." },
    { visible: [50, 30], highlight: [30], path: [50, 30], msg: "Insert 30. 30<50 → go LEFT." },
    { visible: [50, 30, 70], highlight: [70], path: [50, 70], msg: "Insert 70. 70>50 → go RIGHT." },
    { visible: [50, 30, 70, 20, 40, 60, 80], highlight: [], path: [], msg: "Insert remaining nodes following BST rules." },
    { visible: [50, 30, 70, 20, 40, 60, 80], highlight: [50, 70, 60], path: [50, 70, 60], msg: "SEARCH 60: 60>50→right(70), 60<70→left(60). Found! O(log n)." },
    { visible: [50, 30, 70, 20, 40, 60, 80], inorder: [20, 30, 40, 50, 60, 70, 80], highlight: [], path: [], msg: "IN-ORDER (L→N→R): 20,30,40,50,60,70,80. BST gives sorted output!" },
  ];
  const edges = [[50, 30], [50, 70], [30, 20], [30, 40], [70, 60], [70, 80]];

  return (
    <StepViz steps={steps}>
      {(cur) => (
        <svg width="100%" viewBox="0 0 500 270" style={{ display: "block" }}>
          <defs>
            <marker id="bst-a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
              <path d="M0,0 L0,6 L7,3 z" fill="var(--border2)" />
            </marker>
          </defs>
          {edges.map(([f, t]) => {
            if (!cur.visible.includes(f) || !cur.visible.includes(t)) return null;
            const fn = allNodes[f], tn = allNodes[t];
            const isP = cur.path.includes(f) && cur.path.includes(t);
            return <line key={`${f}-${t}`} x1={fn.x} y1={fn.y + 18} x2={tn.x} y2={tn.y - 18}
              stroke={isP ? "var(--accent)" : "var(--border2)"} strokeWidth={isP ? 2.5 : 1.5} />;
          })}
          {cur.visible.map(id => {
            const n = allNodes[id];
            const isH = cur.highlight.includes(id);
            return (
              <g key={id}>
                <circle cx={n.x} cy={n.y} r={20} fill={isH ? "rgba(232,168,124,0.25)" : "var(--node-bg)"}
                  stroke={isH ? "var(--accent)" : "var(--border2)"} strokeWidth={isH ? 2.5 : 1.5} />
                <text x={n.x} y={n.y + 6} textAnchor="middle" fontSize={14} fontWeight={700}
                  fill={isH ? "var(--accent)" : "var(--text)"} fontFamily="DM Mono,monospace">{n.val}</text>
              </g>
            );
          })}
          {cur.inorder && (
            <g>
              <text x={20} y={248} fontSize={10} fill="var(--accent4)" fontFamily="DM Mono,monospace">IN-ORDER: </text>
              {cur.inorder.map((v, i) => (
                <g key={i}>
                  <rect x={105 + i * 48} y={234} width={42} height={22} rx={4}
                    fill="rgba(124,232,180,0.12)" stroke="var(--accent4)" strokeWidth={1} />
                  <text x={126 + i * 48} y={250} textAnchor="middle" fontSize={12} fill="var(--accent4)" fontFamily="DM Mono,monospace">{v}</text>
                </g>
              ))}
            </g>
          )}
        </svg>
      )}
    </StepViz>
  );
}

function SortingViz() {
  const initial = [64, 34, 25, 12, 22, 11, 90];
  const [arr, setArr] = useState([...initial]);
  const [comparing, setComparing] = useState([]);
  const [sorted, setSorted] = useState([]);
  const [running, setRunning] = useState(false);
  const [msg, setMsg] = useState("Press 'Run' to watch Bubble Sort animate step by step.");
  const [swaps, setSwaps] = useState(0);
  const stopRef = useRef(false);

  const reset = () => {
    stopRef.current = true;
    setArr([...initial]); setComparing([]); setSorted([]);
    setMsg("Press 'Run' to watch Bubble Sort animate step by step."); setSwaps(0); setRunning(false);
  };

  const run = async () => {
    stopRef.current = false; setRunning(true); setSorted([]); setSwaps(0);
    let a = [...initial]; setArr([...a]); let sw = 0;
    for (let i = 0; i < a.length - 1; i++) {
      for (let j = 0; j < a.length - i - 1; j++) {
        if (stopRef.current) { setRunning(false); return; }
        setComparing([j, j + 1]);
        setMsg(`Pass ${i + 1}: comparing [${j}]=${a[j]} vs [${j + 1}]=${a[j + 1]}. ${a[j] > a[j + 1] ? "Swap!" : "No swap."}`);
        await sleep(480);
        if (a[j] > a[j + 1]) { [a[j], a[j + 1]] = [a[j + 1], a[j]]; sw++; setArr([...a]); setSwaps(sw); await sleep(320); }
      }
      setSorted(p => [...p, a.length - 1 - i]);
    }
    setSorted([...Array(a.length).keys()]); setComparing([]);
    setMsg(`✓ Sorted! ${sw} total swaps. O(n²) = ${initial.length * initial.length} max comparisons.`);
    setRunning(false);
  };

  const maxV = Math.max(...arr);
  return (
    <div>
      <svg width="100%" viewBox="0 0 520 190" style={{ display: "block" }}>
        {arr.map((val, i) => {
          const h = Math.round((val / maxV) * 140);
          const x = 18 + i * 70;
          const isCmp = comparing.includes(i);
          const isSorted = sorted.includes(i);
          const col = isSorted ? "var(--accent4)" : isCmp ? "var(--accent)" : "#7cbbe8";
          return (
            <g key={i}>
              <rect x={x} y={155 - h} width={56} height={h} rx={4}
                fill={`${col}22`} stroke={col} strokeWidth={isCmp ? 2.5 : 1.5}
                style={{ transition: "all 0.3s" }} />
              <text x={x + 28} y={172} textAnchor="middle" fontSize={13} fontWeight={700}
                fill={col} fontFamily="DM Mono,monospace">{val}</text>
              {isCmp && <text x={x + 28} y={150 - h} textAnchor="middle" fontSize={12} fill={col} fontFamily="DM Mono,monospace">↑</text>}
            </g>
          );
        })}
      </svg>
      <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, color: "var(--muted)", marginBottom: 8 }}>
        Swaps: <span style={{ color: "var(--accent)" }}>{swaps}</span>
      </div>
      <div className="step-msg">{msg}</div>
      <div className="ctrl-row">
        <button className="btn btn-primary" onClick={run} disabled={running}>▶ Run Sort</button>
        <button className="btn" onClick={reset}>↺ Reset</button>
        {running && <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 11, color: "var(--muted)" }}>running…</span>}
      </div>
    </div>
  );
}
